<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Image</title>

    <style>
        body {
            margin: 0;
        }

        .flex-container {
            display: flex;
            height: 100vh;
        }

        .flex-collumn {
            width: 50%;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    
    <div class="flex-container">
        <div class="flex-collumn">
            <h1>The Temple</h1>
            <p>This is an image of the beautiful temple in Accra, Ghana:</p>
        </div>
        <div class="flex-collumn">
            
            <img src="images/temple-cropped.jpeg" alt="The Accra Ghana Temple" width="100%" >
            
            
        </div>
    </div>


</body>

</html>
